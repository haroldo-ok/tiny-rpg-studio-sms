<body>
    <div class="app">
        <main role="main" aria-label="Aplicação principal - Editor e executor de RPG">
            <div class="tabs" role="tablist">
                <h1 class="tabs-title">Tiny RPG Studio</h1>
                <div class="tabs-links">
                    <button class="tab-button active" type="button" data-tab="game" role="tab" aria-selected="true" aria-controls="tab-game" data-text-key="tabs.game"></button>
                    <button class="tab-button" type="button" data-tab="editor" role="tab" aria-selected="false" aria-controls="tab-editor" data-text-key="tabs.editor"></button>
                    <button id="btn-explore" class="tab-action-button tab-action-button--explore" type="button" data-text-key="buttons.explore">Explorar</button>
                    <button id="btn-reset" class="tab-action-button" type="button" data-text-key="buttons.reset" data-aria-label-key="aria.reset"></button>
                    <button id="btn-generate-sms-rom" class="tab-action-button" type="button" title="Export Sega Master System ROM (.sms)"
                        style="background:#1a3a6a;border-color:#3a70d0;color:#6af;font-weight:bold;">
                        &#x1F579; SMS ROM
                    </button>
                </div>
            </div>
            <div id="sms-rom-status" style="display:none;padding:6px 16px;font-size:11px;
                background:#0a1020;border-bottom:2px solid #1a3a6a;text-align:center;
                font-family:monospace;"></div>
            <div class="project-save-controls">
                <button id="btn-manual-save" class="btn-manual-save" type="button" title="Manual Save" aria-label="Save project manually">Save</button>
                <div class="history-dropdown-wrapper">
                    <button id="btn-history-dropdown" class="btn-history-dropdown" type="button" title="Project History" aria-label="Open project history" aria-expanded="false" aria-haspopup="listbox">Load</button>
                    <div id="history-dropdown-menu" class="history-dropdown-menu" role="listbox" aria-label="Project history" hidden>
                        <div id="history-items-container" class="history-items-container"></div>
                    </div>
                </div>
            </div>

            <div class="tab-content active" id="tab-game" role="tabpanel" aria-labelledby="tab-game">
                <div class="game-container" id="game-container">
                    <div id="combat-indicator" class="combat-indicator" aria-live="polite" aria-atomic="true"></div>
                    <div class="game-screen">
                        <canvas id="game-canvas" width="128" height="152"></canvas>
                        <div id="screen-flash" class="screen-flash" aria-hidden="true"></div>
                    </div>
                    <button
                        id="touch-controls-toggle"
                        class="touch-controls-toggle"
                        type="button"
                        aria-controls="mobile-touch-pad"
                        aria-expanded="false"
                        data-text-key="touchControls.show"
                    ></button>
                    <div id="mobile-touch-pad" class="game-touch-pad" aria-hidden="true">
                        <button
                            id="touch-controls-hide"
                            class="touch-controls-hide"
                            type="button"
                            aria-label=""
                            data-text-key="touchControls.hide"
                            data-aria-label-key="touchControls.hide"
                        ></button>
                        <button class="pad-button pad-up" data-direction="up" aria-label="" data-aria-label-key="touchControls.upLabel"></button>
                        <div class="pad-middle-row">
                            <button class="pad-button pad-left" data-direction="left" aria-label="" data-aria-label-key="touchControls.leftLabel"></button>
                            <button class="pad-button pad-center" tabindex="-1" aria-hidden="true"></button>
                            <button class="pad-button pad-right" data-direction="right" aria-label="" data-aria-label-key="touchControls.rightLabel"></button>
                        </div>
                        <button class="pad-button pad-down" data-direction="down" aria-label="" data-aria-label-key="touchControls.downLabel"></button>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="tab-editor" role="tabpanel" aria-labelledby="tab-editor">
                <div class="editor-layout" role="group" aria-label="Game Engine Editor">
                    <div class="editor-left">
                        <div class="editor-section editor-section--tiles" data-mobile-panel="tiles">
                            <details open>
                                <summary data-text-key="sections.tiles"></summary>
                                <div class="tiles-panel">
                                    <p id="tile-preset-summary" class="tile-preset-summary"></p>
                                    <div id="tile-list" class="tile-list"></div>
                                </div>
                            </details>
                        </div>

                        <div class="editor-section editor-section--world" data-mobile-panel="world">
                            <details open>
                                <summary data-text-key="sections.world"></summary>
                                <div class="world-panel">
                                    <div id="world-grid" class="world-grid"></div>
                                    <div id="world-metrics" class="world-metrics"></div>
                                </div>
                            </details>
                        </div>

                        <div class="editor-section editor-section--objects" data-mobile-panel="objects">
                            <details open>
                                <summary data-text-key="sections.objects"></summary>
                                <div class="objects-panel">
                                    <div class="object-category-selector">
                                        <div class="object-category-buttons">
                                            <button type="button" class="object-category-button active" data-object-category-filter="all" aria-pressed="true" data-text-key="objects.category.all"></button>
                                            <button type="button" class="object-category-button" data-object-category-filter="swords" aria-pressed="false" data-text-key="objects.category.swords"></button>
                                        </div>
                                    </div>
                                    <div id="object-types" class="object-types"></div>
                                    <div id="objects-list" class="objects-list"></div>
                                </div>
                            </details>
                        </div>

                    </div>

                    <div class="editor-center">
                        <div class="editor-section editor-section--map">
                            <div class="editor-map-wrapper">
                                <button
                                    type="button"
                                    class="map-nav-button map-nav-button--up"
                                    data-direction="up"
                                    data-aria-label-key="editor.mapNav.up"
                                    data-title-key="editor.mapNav.up"
                                ></button>
                                <button
                                    type="button"
                                    class="map-nav-button map-nav-button--down"
                                    data-direction="down"
                                    data-aria-label-key="editor.mapNav.down"
                                    data-title-key="editor.mapNav.down"
                                ></button>
                                <button
                                    type="button"
                                    class="map-nav-button map-nav-button--left"
                                    data-direction="left"
                                    data-aria-label-key="editor.mapNav.left"
                                    data-title-key="editor.mapNav.left"
                                ></button>
                                <button
                                    type="button"
                                    class="map-nav-button map-nav-button--right"
                                    data-direction="right"
                                    data-aria-label-key="editor.mapNav.right"
                                    data-title-key="editor.mapNav.right"
                                ></button>
                                <canvas id="editor-canvas" width="384" height="384"></canvas>
                            </div>
                            <div class="editor-mobile-nav" aria-label="" data-aria-label-key="editor.mobileNav.label">
                                <button type="button" class="editor-mobile-nav-button active" data-mobile-target="tiles" data-title-key="editor.mobileNav.tiles" data-aria-label-key="editor.mobileNav.tiles">
                                    <canvas class="nav-icon" data-nav-icon="tree" width="16" height="16"></canvas>
                                </button>
                                <button type="button" class="editor-mobile-nav-button" data-mobile-target="world" data-title-key="editor.mobileNav.world" data-aria-label-key="editor.mobileNav.world">
                                    <canvas class="nav-icon" data-nav-icon="water" width="16" height="16"></canvas>
                                </button>
                                <button type="button" class="editor-mobile-nav-button" data-mobile-target="objects" data-title-key="editor.mobileNav.objects" data-aria-label-key="editor.mobileNav.objects">
                                    <canvas class="nav-icon" data-nav-icon="sword" width="16" height="16"></canvas>
                                </button>
                                <button type="button" class="editor-mobile-nav-button" data-mobile-target="npcs" data-title-key="editor.mobileNav.npcs" data-aria-label-key="editor.mobileNav.npcs">
                                    <canvas class="nav-icon" data-nav-icon="oldMage" width="16" height="16"></canvas>
                                </button>
                                <button type="button" class="editor-mobile-nav-button" data-mobile-target="enemies" data-title-key="editor.mobileNav.enemies" data-aria-label-key="editor.mobileNav.enemies">
                                    <canvas class="nav-icon" data-nav-icon="rat" width="16" height="16"></canvas>
                                </button>
                                <button type="button" class="editor-mobile-nav-button" data-mobile-target="project" data-title-key="editor.mobileNav.project" data-aria-label-key="editor.mobileNav.project">
                                    <canvas class="nav-icon" data-nav-icon="scroll" width="16" height="16"></canvas>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="editor-right">
                        <div class="editor-section editor-section--npcs" data-mobile-panel="npcs">
                            <details open>
                                <summary data-text-key="sections.npcs"></summary>
                                <div class="npcs-panel">
                                    <div class="npc-variant-selector">
                                        <div class="npc-variant-buttons">
                                            <button type="button" class="npc-variant-button active" data-npc-variant-filter="human" aria-pressed="true" data-text-key="npc.variant.human"></button>
                                            <button type="button" class="npc-variant-button" data-npc-variant-filter="elf" aria-pressed="false" data-text-key="npc.variant.elf"></button>
                                            <button type="button" class="npc-variant-button" data-npc-variant-filter="dwarf" aria-pressed="false" data-text-key="npc.variant.dwarf"></button>
                                            <button type="button" class="npc-variant-button" data-npc-variant-filter="fixed" aria-pressed="false" data-text-key="npc.variant.fixed"></button>
                                        </div>
                                    </div>
                                    <div id="npcs-list" class="npcs-list"></div>
                                    <div class="npc-editor" hidden>
                                        <label for="npc-text" data-text-key="npc.dialog.defaultLabel"></label>
                                        <textarea id="npc-text" data-placeholder-key="npc.dialog.placeholder"></textarea>
                                        <div class="npc-reward-group">
                                            <label for="npc-reward-variable" data-text-key="npc.reward.defaultLabel"></label>
                                            <select id="npc-reward-variable"></select>
                                        </div>
                                        <div class="npc-conditional-toggle">
                                            <button type="button" id="btn-toggle-npc-conditional" aria-expanded="false" aria-controls="npc-conditional-section" data-text-key="npc.toggle.create"></button>
                                        </div>
                                        <div id="npc-conditional-section" class="npc-conditional-section" hidden>
                                            <div class="npc-conditional-group">
                                                <label for="npc-conditional-variable" data-text-key="npc.conditional.variableLabel"></label>
                                                <select id="npc-conditional-variable"></select>
                                                <label for="npc-conditional-text" data-text-key="npc.conditional.textLabel"></label>
                                                <textarea id="npc-conditional-text" data-placeholder-key="npc.conditional.placeholder"></textarea>
                                            </div>
                                            <div class="npc-reward-group npc-conditional-reward">
                                                <label for="npc-conditional-reward-variable" data-text-key="npc.conditional.rewardLabel"></label>
                                                <select id="npc-conditional-reward-variable"></select>
                                            </div>
                                        </div>
                                        <button id="npc-delete" data-text-key="npc.delete"></button>
                                    </div>
                                </div>
                            </details>
                        </div>

                        <div class="editor-section editor-section--enemies" data-mobile-panel="enemies">
                            <details open>
                                <summary data-text-key="sections.enemies"></summary>
                                <div class="enemies-panel">
                                    <div id="enemy-types" class="enemy-types"></div>
                                    <div id="enemies-list" class="enemies-list"></div>
                                </div>
                            </details>
                        </div>

                        <div class="editor-section editor-section--project" data-mobile-panel="project">
                            <details open>
                                <summary data-text-key="sections.project"></summary>
                                <div class="project-actions">
                                    <div class="project-tabs" role="tablist" aria-label="Project sections">
                                        <button class="project-tab-button active" type="button" role="tab" aria-selected="true" data-project-tab-button="development" data-text-key="project.group.development">Desenvolvimento</button>
                                        <button class="project-tab-button" type="button" role="tab" aria-selected="false" data-project-tab-button="testing" data-text-key="project.group.testing">Testes</button>
                                        <button class="project-tab-button" type="button" role="tab" aria-selected="false" data-project-tab-button="appearance" data-text-key="project.group.appearance">Aparência</button>
                                        <button class="project-tab-button" type="button" role="tab" aria-selected="false" data-project-tab-button="info" data-text-key="project.group.info">Informações</button>
                                        <button class="project-tab-button" type="button" role="tab" aria-selected="false" data-project-tab-button="audio">Audio</button>
                                        <button class="project-tab-button" type="button" role="tab" aria-selected="false" data-project-tab-button="export" data-text-key="project.group.export">Exportação</button>
                                    </div>

                                    <div class="project-tab-panel active" role="tabpanel" data-project-tab-panel="development">
                                    <div class="project-group project-group--development">
                                        <h2 class="project-group__title" data-text-key="project.group.development">Desenvolvimento</h2>
                                        <div id="project-variables-container" class="project-variables">
                                            <button id="project-variables-toggle" class="project-variables__toggle" type="button" aria-expanded="false" aria-controls="project-variable-usage-list"></button>
                                            <div id="project-variable-usage-list" class="project-variables__list"></div>
                                        </div>
                                        <div id="project-skills-container" class="project-variables project-variables--skills">
                                            <button id="project-skills-toggle" class="project-variables__toggle" type="button" aria-expanded="false" aria-controls="project-skills-list"></button>
                                            <ol id="project-skills-list" class="project-variables__list project-skills__list"></ol>
                                            <button id="project-skills-reset-order" class="project-skills-reset-btn" type="button" data-text-key="project.skills.resetOrder" hidden></button>
                                            <label class="project-variables__field project-variables__checkbox">
                                                <input type="checkbox" id="project-disable-skills">
                                                <span data-text-key="project.disableSkills"></span>
                                            </label>
                                        </div>
                                    </div>
                                    </div>

                                    <!-- Grupo: Testes -->
                                    <div class="project-tab-panel" role="tabpanel" data-project-tab-panel="testing" hidden>
                                    <div class="project-group project-group--testing">
                                        <h2 class="project-group__title" data-text-key="project.group.testing">Testes</h2>
                                        <div id="project-test-container" class="project-variables project-test">
                                            <div id="project-test-panel" class="project-test__panel">
                                                <p class="project-test__hint" data-text-key="project.test.hint"></p>
                                                <label class="project-test__field">
                                                    <span data-text-key="project.test.startLevel"></span>
                                                    <select id="project-test-start-level"></select>
                                                </label>
                                                <label class="project-test__field project-test__checkbox">
                                                    <input type="checkbox" id="project-test-god-mode">
                                                    <span data-text-key="project.test.godMode"></span>
                                                </label>
                                                <label class="project-test__field project-test__checkbox">
                                                    <input type="checkbox" id="project-test-debug-vision">
                                                    <span data-text-key="project.test.debugVision"></span>
                                                </label>
                                                <div class="project-test__skills" role="group" aria-labelledby="project-test-skills-title">
                                                    <div id="project-test-skills-title" class="project-test__skills-title" data-text-key="project.test.skills"></div>
                                                    <ul id="project-test-skill-list" class="project-test__skill-list"></ul>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    </div>

                                    <!-- Grupo: Aparência -->
                                    <div class="project-tab-panel" role="tabpanel" data-project-tab-panel="appearance" hidden>
                                    <div class="project-group project-group--appearance">
                                        <h2 class="project-group__title" data-text-key="project.group.appearance">Aparência</h2>
                                        <div id="project-palette-container" class="project-variables project-palette">
                                            <div id="project-palette-panel" class="project-palette__panel">
                                                <div class="palette-header">
                                                    <p class="palette-description" data-text-key="project.paletteDescription"></p>
                                                    <div style="display:flex;gap:8px;margin-bottom:8px;">
                                                        <button id="palette-import-button" class="palette-action-btn" type="button">import</button>
                                                        <button id="palette-export-button" class="palette-action-btn" type="button">export</button>
                                                    </div>
                                                    <button
                                                        id="palette-reset-button"
                                                        class="palette-reset-btn"
                                                        data-text-key="project.paletteReset"
                                                        title="Reset to PICO-8 colors"
                                                    ></button>
                                                </div>
                                                <div class="palette-preset-field">
                                                    <label data-text-key="project.palettePreset"></label>
                                                    <select id="palette-preset-select"></select>
                                                </div>
                                                <div id="palette-grid" class="palette-grid"></div>
                                            </div>
                                        </div>
                                        <label class="project-test__field project-test__checkbox project-appearance__checkbox">
                                            <input type="checkbox" id="project-hide-hud">
                                            <span data-text-key="project.hideHud"></span>
                                        </label>
                                        <label class="project-test__field project-test__checkbox project-appearance__checkbox">
                                            <input type="checkbox" id="project-disable-pixel-font">
                                            <span data-text-key="project.disablePixelFont"></span>
                                        </label>
                                    </div>
                                    </div>

                                    <!-- Skill Edit Modal -->
                                    <div id="skill-edit-modal" class="skill-edit-modal" hidden>
                                        <div class="skill-edit-modal__content">
                                            <div class="skill-edit-modal__panel">
                                                <div class="skill-edit-modal__header">
                                                    <h3 data-text-key="skills.edit.modalTitle">Editar Skill</h3>
                                                </div>
                                                <div class="skill-edit-modal__fields">
                                                    <div class="skill-edit-modal__field">
                                                        <label for="skill-edit-icon" data-text-key="skills.edit.iconLabel">Ícone</label>
                                                        <div class="skill-edit-modal__icon-row">
                                                            <span id="skill-edit-icon-preview" class="skill-edit-modal__icon-preview" aria-hidden="true"></span>
                                                            <input type="text" id="skill-edit-icon" class="skill-edit-modal__input skill-edit-modal__input--icon" autocomplete="off" data-aria-label-key="skills.edit.iconAriaLabel" />
                                                        </div>
                                                    </div>
                                                    <div class="skill-edit-modal__field">
                                                        <label for="skill-edit-name" data-text-key="skills.edit.nameLabel">Nome</label>
                                                        <input type="text" id="skill-edit-name" class="skill-edit-modal__input" autocomplete="off" data-aria-label-key="skills.edit.nameAriaLabel" />
                                                        <span id="skill-edit-name-counter" class="skill-edit-modal__counter" aria-live="polite"></span>
                                                    </div>
                                                    <div class="skill-edit-modal__field">
                                                        <label for="skill-edit-desc" data-text-key="skills.edit.descLabel">Descrição</label>
                                                        <textarea id="skill-edit-desc" class="skill-edit-modal__input skill-edit-modal__input--desc" autocomplete="off" rows="3" spellcheck="true" data-aria-label-key="skills.edit.descAriaLabel"></textarea>
                                                        <span id="skill-edit-desc-counter" class="skill-edit-modal__counter" aria-live="polite"></span>
                                                    </div>
                                                </div>
                                                <div class="skill-edit-modal__actions">
                                                    <button id="skill-edit-restore" type="button" class="btn-secondary" data-text-key="skills.edit.restoreDefaults">Restaurar padrão</button>
                                                    <div class="skill-edit-modal__actions-right">
                                                        <button id="skill-edit-cancel" type="button" class="btn-secondary" data-text-key="skills.edit.cancel">Cancelar</button>
                                                        <button id="skill-edit-save" type="button" class="btn-primary" data-text-key="skills.edit.save">Salvar</button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Color Picker Modal -->
                                    <div id="color-picker-modal" class="color-picker-modal" hidden>
                                        <div class="color-picker-content">
                                            <div class="color-picker-panel">
                                                <div class="color-picker-header">
                                                    <h3 data-text-key="project.colorPickerTitle"></h3>
                                                    <span id="color-picker-index" class="color-index-label"></span>
                                                </div>
                                                <div class="color-picker-preview">
                                                    <div class="color-preview-box">
                                                        <div id="color-preview-current" class="color-preview-row">
                                                            <div class="color-preview-meta">
                                                                <span class="color-preview-label" data-text-key="project.colorCurrent"></span>
                                                                <span id="color-preview-current-value" class="color-preview-value"></span>
                                                            </div>
                                                            <div class="color-preview-swatch"></div>
                                                        </div>
                                                        <div id="color-preview-new" class="color-preview-row">
                                                            <div class="color-preview-meta">
                                                                <span class="color-preview-label" data-text-key="project.colorNew"></span>
                                                                <span id="color-preview-new-value" class="color-preview-value"></span>
                                                            </div>
                                                            <div class="color-preview-swatch"></div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <input
                                                    type="color"
                                                    id="color-picker-input"
                                                    class="color-picker-input"
                                                />
                                                <div class="color-picker-actions">
                                                    <button
                                                        id="color-picker-cancel"
                                                        class="btn-secondary"
                                                        data-text-key="project.colorCancel"
                                                    ></button>
                                                    <button
                                                        id="color-picker-confirm"
                                                        class="btn-primary"
                                                        data-text-key="project.colorConfirm"
                                                    ></button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Grupo: Informações -->
                                    <div class="project-tab-panel" role="tabpanel" data-project-tab-panel="info" hidden>
                                    <div class="project-group project-group--info">
                                        <h2 class="project-group__title" data-text-key="project.group.info">Informações</h2>
                                        <label class="project-field">
                                            <span data-text-key="project.titleLabel"></span>
                                            <input type="text" id="game-title" data-placeholder-key="project.titlePlaceholder" maxlength="18">
                                        </label>
                                        <label class="project-field">
                                            <span data-text-key="project.authorLabel"></span>
                                            <input type="text" id="game-author" data-placeholder-key="project.authorPlaceholder" maxlength="18">
                                        </label>
                                        <label class="project-field project-field--language">
                                            <span data-text-key="project.languageLabel"></span>
                                            <select id="language-select">
                                                <option value="pt-BR" data-text-key="language.option.ptBR"></option>
                                                <option value="en-US" data-text-key="language.option.enUS"></option>
                                            </select>
                                        </label>
                                    </div>
                                    </div>

                                    <!-- Grupo: Exportação -->
                                    <div class="project-tab-panel" role="tabpanel" data-project-tab-panel="audio" hidden>
                                    <div class="project-group project-group--audio">
                                        <h2 class="project-group__title">Audio</h2>
                                        <div class="project-variables project-variables--music">
                                            <details open>
                                                <summary>Background Music</summary>
                                                <label class="project-field">
                                                    <span>YouTube URL</span>
                                                    <input
                                                        type="url"
                                                        id="project-background-music-url"
                                                        placeholder="https://www.youtube.com/watch?v=t0ihNLLZNi0"
                                                        inputmode="url"
                                                        autocomplete="off"
                                                        spellcheck="false"
                                                    >
                                                </label>
                                            </details>
                                        </div>
                                    </div>
                                    </div>

                                    <div class="project-tab-panel" role="tabpanel" data-project-tab-panel="export" hidden>
                                    <div class="project-group project-group--export">
                                        <h2 class="project-group__title" data-text-key="project.group.export">Exportação</h2>
                                        <p class="project-share-hint" data-text-key="project.shareHint"></p>
                                        <button id="btn-generate-url" data-text-key="project.generateUrl"></button>
                                        <label class="project-field project-field--share-url">
                                            <span data-text-key="project.shareUrlLabel"></span>
                                            <input id="project-share-url" type="text" readonly spellcheck="false" autocomplete="off" inputmode="url">
                                        </label>
                                        <button id="btn-import-html" data-text-key="project.importHTML"></button>
                                        <button id="btn-generate-html" data-text-key="project.generateHTML"></button>
                                    </div>
                                    </div>
                                </div>
                            </details>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <input type="file" id="file-input" accept=".json" style="display: none;">

    <!-- Explore Modal -->
    <div id="explore-modal" class="explore-modal" hidden role="dialog" aria-modal="true" aria-labelledby="explore-modal-title">
        <div class="explore-modal__panel">
            <div class="explore-modal__header">
                <div class="explore-modal__title-group">
                    <h2 id="explore-modal-title" class="explore-modal__title" data-text-key="explore.title">Explorar Jogos</h2>
                    <p id="explore-subtitle" class="explore-modal__subtitle"></p>
                </div>
                <button type="button" id="explore-close" class="explore-modal__close" data-aria-label-key="explore.closeAria">✕</button>
            </div>
            <div class="explore-modal__body">
                <div id="explore-back-banner" class="explore-back-banner" hidden>
                    <button type="button" id="btn-explore-back" class="explore-back-btn btn-secondary" data-text-key="explore.backToMyGame">← Voltar para meu jogo</button>
                </div>
                <div id="explore-loading" class="explore-loading" hidden>
                    <span class="explore-spinner"></span>
                </div>
                <p id="explore-empty" class="explore-empty" hidden data-text-key="explore.empty">Nenhum jogo disponível ainda.</p>
                <div id="explore-grid" class="explore-grid" role="list"></div>
            </div>
        </div>
    </div>

    <div id="pixel-art-editor-modal" class="pixel-art-editor-modal" hidden>
        <div class="pixel-art-editor">
            <div class="pae-header">
                <span class="pae-title" data-text-key="pixelArtEditor.title">PIXEL ART EDITOR</span>
                <button type="button" class="pae-close" id="pae-close" data-aria-label-key="pixelArtEditor.closeAria">X</button>
            </div>
            <div class="pae-sprite-meta" id="pae-sprite-meta"></div>
            <div class="pae-variant-bar" id="pae-variant-bar" hidden></div>
            <div class="pae-frame-bar" id="pae-frame-bar" hidden></div>
            <div class="pae-editor-area">
                <canvas id="pae-canvas" width="256" height="256"></canvas>
            </div>
            <div class="pae-palette" id="pae-palette"></div>
            <div class="pae-tools">
                <button type="button" class="pae-tool active" data-tool="paint" id="pae-tool-paint" data-text-key="pixelArtEditor.paint">Pintar</button>
                <button type="button" class="pae-tool" data-tool="erase" id="pae-tool-erase" data-text-key="pixelArtEditor.erase">Apagar</button>
            </div>
            <div class="pae-actions">
                <button type="button" id="pae-reset" data-text-key="pixelArtEditor.reset">Restaurar padrão</button>
                <button type="button" id="pae-save" class="pae-save-btn" data-text-key="pixelArtEditor.save">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Firebase disabled for standalone build: share/explore features require the live server -->
    <script>
        // Stub Firebase globals so FirebaseShareTracker initialises gracefully
        window.TinyRPGFirebaseConfig = null;
        window.TinyRPGFirebaseCollection = "shareUrls";
        window.TinyRPGFirebaseApp = null;
        window.TinyRPGFirebaseDb = null;
        window.TinyRPGFirebaseFirestore = null;
        window.TinyRPGFirebaseGamesCollection = "games";
    </script>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
